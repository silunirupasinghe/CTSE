version: '3.8'
services:
  item-service:
    build: ./item-service
    container_name: item-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
    networks:
      - microservices-net

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
    networks:
      - microservices-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - ITEM_SERVICE_URI=http://item-service:8081
      - ORDER_SERVICE_URI=http://order-service:8082
      - PAYMENT_SERVICE_URI=http://payment-service:8083
    depends_on:
      - item-service
      - order-service
      - payment-service
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
