server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: item-service
          uri: ${ITEM_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/items,/items/**
        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/orders,/orders/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/payments,/payments/**
